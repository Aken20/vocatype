name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          cd python-backend
          python -m venv .venv
          .venv\Scripts\activate
          pip install -r requirements.txt
      - name: Syntax check
        run: |
          cd python-backend
          .venv\Scripts\python.exe -m py_compile *.py routes/*.py

  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: |
          cd tauri-app
          npm ci
      - name: TypeScript check
        run: |
          cd tauri-app
          npx tsc --noEmit
      - name: Lint
        run: |
          cd tauri-app
          npx oxlint
      - name: Build
        run: |
          cd tauri-app
          npm run build
